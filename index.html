<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa głosowania</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: sans-serif;
    }

    body {
      display: flex;
    }

    #sidebar {
      width: 300px;
      height: 100%;
      box-sizing: border-box;
      padding: 12px;
      overflow-y: auto;
      background: #ffffff;
      border-right: 1px solid #ccc;
      box-shadow: 2px 0 6px rgba(0,0,0,0.15);
      z-index: 1000;
    }

    #sidebar h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    #feature-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .feature-list-item {
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #f8f8f8;
      padding: 8px;
      text-align: left;
      cursor: pointer;
      font-weight: normal;
      width: 100%;
      margin: 0;
      transition: background 0.15s ease, border-color 0.15s ease, outline 0.15s ease;
    }

    .feature-list-item.vote-yes {
      background: rgba(44, 162, 95, 0.22);
      border-color: #2ca25f;
    }

    .feature-list-item.vote-no {
      background: rgba(222, 45, 38, 0.22);
      border-color: #de2d26;
    }

    .feature-list-item.vote-neutral {
      background: rgba(119, 119, 119, 0.18);
      border-color: #777777;
    }

    .feature-list-item:hover {
      filter: brightness(0.96);
    }

    .feature-list-item.active {
      outline: 3px solid #333;
    }

    .feature-list-name {
      font-weight: bold;
      display: block;
    }

    .feature-list-meta {
      color: #555;
      font-size: 12px;
      margin-top: 3px;
      display: block;
    }

    #map {
      height: 100%;
      flex: 1;
    }

    .trail-label {
      font-weight: bold;
      font-size: 12px;
      background: rgba(255,255,255,0.9);
      border: 1px solid #666;
      border-radius: 4px;
      padding: 2px 4px;
    }

    .panel {
      background: white;
      padding: 10px;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
      font-family: sans-serif;
      font-size: 13px;
      min-width: 210px;
    }

    .legend-item {
      margin: 4px 0;
    }

    .box {
      display: inline-block;
      width: 14px;
      height: 14px;
      margin-right: 6px;
      vertical-align: middle;
    }

    button {
      margin-top: 4px;
      width: 100%;
      padding: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .active-filter {
      outline: 3px solid #333;
    }
  </style>
</head>

<body>
  <aside id="sidebar">
    <h2>Obszary do głosowania</h2>
    <div style="font-size:12px; line-height:1.4; margin-bottom:10px; color:#555;">
      Kliknij nazwę, aby przybliżyć obszar i otworzyć dialog głosowania.
    </div>
    <div id="feature-list"></div>
  </aside>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const GEOJSON_FILE = 'bufory.geojson';
    const MAIL_TO = 'twoj-email@example.com';

    const map = L.map('map').setView([53.2, 23.3], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const votes = {};
    const layersById = {};
    const listItemsById = {};
    let currentFilter = 'all';

    const voteColors = {
      yes: '#2ca25f',
      no: '#de2d26',
      neutral: '#777777'
    };

    function getFeatureId(feature) {
      return (
        feature.properties.id ||
        feature.properties.fid ||
        feature.properties.name ||
        crypto.randomUUID()
      );
    }

    function getStyle(vote) {
      return {
        color: voteColors[vote],
        fillColor: voteColors[vote],
        weight: 2,
        fillOpacity: vote === 'neutral' ? 0.25 : 0.45
      };
    }

    function formatLength(value) {
      const n = Number(value || 0);
      return n ? (n / 1000).toFixed(3) + ' km' : 'brak danych';
    }

    function formatArea(value) {
      const n = Number(value || 0);
      return n ? (n / 10000).toFixed(2) + ' ha' : 'brak danych';
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function updateListItemVote(id) {
      const item = listItemsById[id];
      if (!item) return;

      item.classList.remove('vote-yes', 'vote-no', 'vote-neutral');
      item.classList.add('vote-' + votes[id]);
    }

    function updateVisibility() {
      Object.entries(layersById).forEach(([id, layer]) => {
        const vote = votes[id];

        let visible = true;

        if (currentFilter === 'yes') visible = vote === 'yes';
        if (currentFilter === 'no') visible = vote === 'no';
        if (currentFilter === 'neutral') visible = vote === 'neutral';

        if (visible) {
          if (!map.hasLayer(layer)) layer.addTo(map);
        } else {
          if (map.hasLayer(layer)) map.removeLayer(layer);
        }
      });
    }

    function setActiveListItem(id) {
      Object.values(listItemsById).forEach(item => item.classList.remove('active'));

      const item = listItemsById[id];
      if (item) {
        item.classList.add('active');
        item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    function zoomToFeature(id) {
      const layer = layersById[id];
      if (!layer) return;

      if (!map.hasLayer(layer)) {
        setFilter('all');
      }

      const bounds = layer.getBounds ? layer.getBounds() : null;

      if (bounds && bounds.isValid()) {
        map.fitBounds(bounds, { maxZoom: 17, padding: [40, 40] });
      }

      layer.openPopup();
      setActiveListItem(id);
    }

    function addFeatureToList(id, name, length, area) {
      const list = document.getElementById('feature-list');
      const item = document.createElement('button');

      item.type = 'button';
      item.className = 'feature-list-item vote-neutral';
      item.innerHTML = `
        <span class="feature-list-name">${escapeHtml(name)}</span>
        <span class="feature-list-meta">Długość: ${escapeHtml(length)} · Powierzchnia: ${escapeHtml(area)}</span>
      `;

      item.addEventListener('click', () => zoomToFeature(id));

      list.appendChild(item);
      listItemsById[id] = item;
      updateListItemVote(id);
    }

    function updateSummary() {
      const totals = {
        yes: 0,
        no: 0,
        neutral: 0
      };

      Object.entries(votes).forEach(([id, vote]) => {
        const layer = layersById[id];
        if (!layer) return;

        const area = Number(layer.feature.properties.area_m2 || 0);
        totals[vote] += area;
      });

      document.getElementById('summary-yes').textContent =
        (totals.yes / 10000).toFixed(2) + ' ha';

      document.getElementById('summary-no').textContent =
        (totals.no / 10000).toFixed(2) + ' ha';

      document.getElementById('summary-neutral').textContent =
        (totals.neutral / 10000).toFixed(2) + ' ha';
    }

    function setVote(id, vote) {
      votes[id] = vote;

      const layer = layersById[id];
      if (layer) layer.setStyle(getStyle(vote));

      updateListItemVote(id);
      updateVisibility();
      updateSummary();
    }

    function clearVotes() {
      Object.keys(votes).forEach(id => {
        votes[id] = 'neutral';

        const layer = layersById[id];
        if (layer) layer.setStyle(getStyle('neutral'));
        updateListItemVote(id);
      });

      updateVisibility();
      updateSummary();
    }

    function setFilter(filter) {
      currentFilter = filter;

      document
        .querySelectorAll('.filter-button')
        .forEach(btn => btn.classList.remove('active-filter'));

      const active = document.getElementById('filter-' + filter);
      if (active) active.classList.add('active-filter');

      updateVisibility();
    }

    function buildVotesJson() {
      const result = [];

      Object.entries(votes).forEach(([id, vote]) => {
        const layer = layersById[id];
        if (!layer) return;

        const p = layer.feature.properties;

        result.push({
          name: p.name,
          vote: vote
        });
      });

      return JSON.stringify(result, null, 2);
    }
    
    function buildVotesText() {
  return Object.entries(votes)
    .map(([id, vote]) => {
      const layer = layersById[id];
      if (!layer) return null;

      const name = layer.feature.properties.name || 'Bez nazwy';

      const label =
        vote === 'yes' ? 'TAK' :
        vote === 'no' ? 'NIE' :
        'NEUTRALNIE';

      return `${name}: ${label}`;
    })
    .filter(Boolean)
    .join('\n');
}

    function sendVotesByMail() {
  const votesText = buildVotesText();

  navigator.clipboard.writeText(votesText)
    .then(() => {
      const subject = encodeURIComponent('Głosy dla tras');
      const body = encodeURIComponent(
        'Głosy zostały skopiowane do schowka.\n\n' +
        'Wklej je poniżej skrótem Ctrl+V.'
      );

      window.location.href =
        `mailto:${MAIL_TO}?subject=${subject}&body=${body}`;
    })
    .catch(() => {
      showVotesDialog();
    });
}

    fetch(GEOJSON_FILE)
      .then(response => response.json())
      .then(data => {
        const geoLayer = L.geoJSON(data, {
          style: feature => getStyle('neutral'),

          onEachFeature: (feature, layer) => {
            const p = feature.properties;
            const id = getFeatureId(feature);

            votes[id] = 'neutral';
            layersById[id] = layer;

            const name = p.name || 'Bez nazwy';
            const length = formatLength(p.length);
            const area = formatArea(p.area_m2);

            const tooltipLabel = `<b>${escapeHtml(name)}</b>`;
            const safeId = JSON.stringify(id);

            const popup = `
              <b>${escapeHtml(name)}</b><br>
              Długość: ${escapeHtml(length)}<br>
              Powierzchnia: ${escapeHtml(area)}<br><br>

              <b>Głos:</b><br>

              <button onclick='setVote(${safeId}, "yes")'>TAK</button>
              <button onclick='setVote(${safeId}, "neutral")'>NEUTRALNIE</button>
              <button onclick='setVote(${safeId}, "no")'>NIE</button>
            `;

            layer.bindTooltip(tooltipLabel, {
              permanent: true,
              direction: 'center',
              className: 'trail-label'
            });

            layer.bindPopup(popup);

            addFeatureToList(id, name, length, area);

            layer.on('click', () => {
              setActiveListItem(id);
            });

            layer.on('popupopen', () => {
              setActiveListItem(id);
            });

            layer.on('mouseover', () => {
              layer.setStyle({
                weight: 5,
                fillOpacity: 0.65
              });
              layer.bringToFront();
            });

            layer.on('mouseout', () => {
              layer.setStyle(getStyle(votes[id]));
            });
          }
        }).addTo(map);

        const bounds = geoLayer.getBounds();

        if (bounds.isValid()) {
          map.fitBounds(bounds);
        }

        updateSummary();
      });

    const legend = L.control({ position: 'bottomright' });

    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'panel');

      div.innerHTML = `
        <b>Legenda</b>

        <div class="legend-item">
          <span class="box" style="background:${voteColors.yes}"></span>
          TAK
        </div>

        <div class="legend-item">
          <span class="box" style="background:${voteColors.no}"></span>
          NIE
        </div>

        <div class="legend-item">
          <span class="box" style="background:${voteColors.neutral}"></span>
          NEUTRALNIE
        </div>
      `;

      return div;
    };

    legend.addTo(map);

    const filterPanel = L.control({ position: 'topright' });

    filterPanel.onAdd = function () {
      const div = L.DomUtil.create('div', 'panel');

      div.innerHTML = `
        <b>Instrukcja</b><br><br>

        <div style="font-size:12px; line-height:1.4; margin-bottom:10px;">
          Kliknij obszar, aby oddać głos.
          <br><br>
          <b>TAK</b> — obszar odpowiedni<br>
          <b>NIE</b> — obszar nieodpowiedni<br>
          <b>NEUTRALNIE</b> — brak decyzji
          <br><br>
          Użyj filtrów, aby wyświetlić tylko wybrane głosy.
        </div>

        <hr>

        <b>Filtry</b><br>

        <button id="filter-all" class="filter-button active-filter" onclick="setFilter('all')">
          Pokaż wszystkie
        </button>

        <button id="filter-yes" class="filter-button" onclick="setFilter('yes')">
          Pokaż tylko TAK
        </button>

        <button id="filter-no" class="filter-button" onclick="setFilter('no')">
          Pokaż tylko NIE
        </button>

        <button id="filter-neutral" class="filter-button" onclick="setFilter('neutral')">
          Pokaż tylko NEUTRALNE
        </button>

        <hr>

        <b>Podsumowanie powierzchni</b><br>
        TAK: <span id="summary-yes">0.00 ha</span><br>
        NIE: <span id="summary-no">0.00 ha</span><br>
        NEUTRALNIE: <span id="summary-neutral">0.00 ha</span><br>

        <hr>

        <button onclick="clearVotes()">
          Wyczyść głosy
        </button>

        <button onclick="sendVotesByMail()">
          Wyślij głosy mailem
        </button>
      `;

      return div;
    };

    filterPanel.addTo(map);
  </script>
</body>
</html>
