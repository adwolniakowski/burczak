<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Burczak Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    .trail-label {
  font-weight: bold;
  font-size: 12px;
  background: rgba(255,255,255,0.85);
  border: 1px solid #666;
  border-radius: 4px;
  padding: 2px 4px;
  box-shadow: 0 0 3px rgba(0,0,0,0.3);
}
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>

    const map = L.map('map').setView([53.2, 23.3], 11);

    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }
    ).addTo(map);

    fetch('burczak.geojson')
      .then(response => response.json())
      .then(data => {

        const layer = L.geoJSON(data, {

          style: feature => {

            const colors = [
              '#e41a1c',
              '#377eb8',
              '#4daf4a',
              '#984ea3',
              '#ff7f00',
              '#a65628',
              '#f781bf',
              '#999999',
              '#66c2a5',
              '#fc8d62'
            ];

            const name = feature.properties.name || 'default';

            let hash = 0;

            for (let i = 0; i < name.length; i++) {
              hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }

            const color =
              colors[Math.abs(hash) % colors.length];

            return {
              color: color,
              fillColor: color,
              weight: 2,
              fillOpacity: 0.35
            };
          },

          onEachFeature: (feature, layer) => {

  const p = feature.properties;

  const name =
    p.name || 'Unnamed';

  const length =
    p.length
      ? (Number(p.length) / 1000).toFixed(3) + ' km'
      : 'n/a';

  const area =
    p.area
      ? (Number(p.area) / 10000).toFixed(2) + ' ha'
      : 'n/a';

  const color =
    layer.options.color || '#000';

  const nameLabel = `
  <div style="color:${color}">
    <b>${name}</b>
  </div>
`;

const popupLabel = `
  <div style="color:${color}">
    <b>${name}</b><br>
    Length: ${length}<br>
    Area: ${area}
  </div>
`;

const tooltip = layer.bindTooltip(nameLabel, {
  permanent: true,
  direction: 'center',
  className: 'trail-label'
});

layer.bindPopup(popupLabel);

  // original style backup
  const originalStyle = {
    weight: 2,
    fillOpacity: 0.35
  };

  // feature hover
  layer.on('mouseover', () => {
    layer.setStyle({
      weight: 5,
      fillOpacity: 0.6
    });

    layer.bringToFront();
  });

  layer.on('mouseout', () => {
    layer.setStyle(originalStyle);
  });

  // tooltip hover highlight
  tooltip.on('add', () => {

    const el = tooltip.getElement();

    if (!el) return;

    el.addEventListener('mouseenter', () => {
      layer.setStyle({
        weight: 5,
        fillOpacity: 0.6
      });

      layer.bringToFront();
    });

    el.addEventListener('mouseleave', () => {
      layer.setStyle(originalStyle);
    });
  });
}

        }).addTo(map);

        const bounds = layer.getBounds();

        if (bounds.isValid()) {
          map.fitBounds(bounds);
        } else {
          console.error(
            'Invalid bounds. Export GeoJSON as EPSG:4326.'
          );
        }

      });

  </script>
</body>
</html>
